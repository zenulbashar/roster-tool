name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: roster
          POSTGRES_PASSWORD: roster
          POSTGRES_DB: roster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roster"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://roster:roster@localhost:5432/roster_test
      AUTH_SECRET: ci-test-secret-not-for-production
      APP_URL: http://localhost:3000
      EMAIL_TRANSPORT: smtp
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test
